<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <title>Balatero Elite - Vehicle Rental</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111111;
      --card: #1a1a1a;
      --border: #262626;
      --muted: #a3a3a3;
      --fg: #f5f5f5;
      --accent: #eab308;
      --accent-hover: #facc15;
      --success: #22c55e;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial, Apple Color Emoji, Segoe UI Emoji;
      background: var(--bg);
      color: var(--fg);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--accent);
    }
    nav {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    nav a, nav button {
      color: var(--fg);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
      background: none;
      border: none;
      cursor: pointer;
    }
    nav a:hover, nav a.active, nav button:hover {
      color: var(--accent);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      text-align: center;
      padding: 48px 0;
    }
    .hero h1 {
      font-size: 48px;
      margin: 0 0 16px;
      background: linear-gradient(135deg, var(--accent) 0%, #fbbf24 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 18px;
      color: var(--muted);
      margin: 0 0 32px;
    }
    .filters {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 20px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--fg);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }
    .vehicles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .vehicle-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .vehicle-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    .vehicle-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: var(--card);
    }
    .vehicle-info {
      padding: 20px;
    }
    .vehicle-name {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 8px;
    }
    .vehicle-type {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 12px;
    }
    .vehicle-details {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .detail {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 14px;
    }
    .vehicle-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .price {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }
    .price span {
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
    }
    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 14px;
    }
    .btn:hover {
      background: var(--accent-hover);
    }
    .btn-secondary {
      background: var(--card);
      color: var(--fg);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--border);
    }
    .btn-success {
      background: var(--success);
      color: #000;
    }
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }
    .modal.open {
      display: flex;
    }
    .modal-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 {
      margin: 0;
      font-size: 20px;
    }
    .modal-body {
      padding: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--fg);
      font-size: 16px;
    }
    .modal-footer {
      padding: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .success-message {
      text-align: center;
      padding: 24px;
    }
    .success-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    .contact {
      margin-top: 64px;
      padding-top: 48px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .contact h2 {
      font-size: 28px;
      margin: 0 0 16px;
    }
    .contact p {
      color: var(--muted);
      margin: 8px 0;
    }
    
    /* Admin Styles */
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .stat-label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
    }
    .bookings-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .bookings-table th, .bookings-table td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .bookings-table th {
      background: var(--card);
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
    }
    .bookings-table tr:last-child td {
      border-bottom: none;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-pending {
      background: rgba(234, 179, 8, 0.2);
      color: var(--accent);
    }
    .status-confirmed {
      background: rgba(34, 197, 94, 0.2);
      color: var(--success);
    }
    .status-cancelled {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }
    .action-buttons {
      display: flex;
      gap: 8px;
    }
    .action-buttons .btn {
      padding: 6px 12px;
      font-size: 12px;
    }
    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }
    
    /* Login Modal */
    .login-container {
      max-width: 400px;
      margin: 80px auto;
    }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }
    .login-card h2 {
      margin: 0 0 24px;
      text-align: center;
    }
    
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 32px;
      }
      .vehicles {
        grid-template-columns: 1fr;
      }
      .bookings-table {
        font-size: 14px;
      }
      .bookings-table th, .bookings-table td {
        padding: 12px 8px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">BALATERO ELITE</div>
    <nav>
      <a href="#" class="nav-link active" data-page="home">Home</a>
      <a href="#" class="nav-link" data-page="admin">Admin</a>
      <button id="authBtn" style="display: none;"></button>
      <button class="btn" onclick="scrollToVehicles()">Rent Now</button>
    </nav>
  </header>

  <!-- Home Page -->
  <div id="homePage" class="page active">
    <main class="container">
      <section class="hero">
        <h1>Drive Your Adventure</h1>
        <p>Premium cars and motorcycles for your next journey</p>
      </section>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="car">Cars</button>
        <button class="filter-btn" data-filter="motorcycle">Motorcycles</button>
      </div>

      <div class="vehicles" id="vehicles"></div>

      <section class="contact" id="contact">
        <h2>Contact Us</h2>
        <p>📞 +1 (555) 123-4567</p>
        <p>📧 rentals@balateroelite.com</p>
        <p>📍 123 Main Street, City, State 12345</p>
      </section>
    </main>
  </div>

  <!-- Admin Page -->
  <div id="adminPage" class="page">
    <main class="container">
      <div id="adminContent">
        <div class="login-container">
          <div class="login-card">
            <h2>Admin Login</h2>
            <div class="form-group">
              <label for="adminEmail">Email</label>
              <input type="email" id="adminEmail" placeholder="admin@example.com">
            </div>
            <div class="form-group">
              <label for="adminPassword">Password</label>
              <input type="password" id="adminPassword" placeholder="••••••••">
            </div>
            <div id="loginError" style="color: var(--danger); font-size: 14px; margin-bottom: 16px; display: none;"></div>
            <button class="btn" style="width: 100%;" onclick="adminLogin()">Login</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="bookingModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modalTitle">Book Vehicle</h3>
        <button class="btn btn-secondary" id="closeModal" style="padding: 8px 16px;">✕</button>
      </div>
      <div class="modal-body" id="modalBody">
        <div class="form-group">
          <label for="customerName">Your Name</label>
          <input type="text" id="customerName" placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label for="customerEmail">Email</label>
          <input type="email" id="customerEmail" placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="customerPhone">Phone</label>
          <input type="tel" id="customerPhone" placeholder="Enter your phone number">
        </div>
        <div class="form-group">
          <label for="pickupDate">Pickup Date</label>
          <input type="date" id="pickupDate">
        </div>
        <div class="form-group">
          <label for="returnDate">Return Date</label>
          <input type="date" id="returnDate">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn" id="confirmBtn">Confirm Booking</button>
      </div>
    </div>
  </div>

  <script>
    // Configuration - Replace these with your actual Supabase credentials
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    
    let supabase;
    let currentUser = null;
    let selectedVehicle = null;
    let currentFilter = 'all';
    let vehicles = [
      {
        id: 1,
        name: "Toyota Vios",
        type: "car",
        image: "https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=Toyota%20Vios%20white%20sedan%20car%20front%20view%20professional%20photo&image_size=square_hd",
        price: 1500,
        seats: 5,
        transmission: "Automatic",
        fuel: "Gasoline"
      },
      {
        id: 2,
        name: "Honda City",
        type: "car",
        image: "https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=Honda%20City%20silver%20sedan%20car%20modern%20design&image_size=square_hd",
        price: 1800,
        seats: 5,
        transmission: "Automatic",
        fuel: "Gasoline"
      },
      {
        id: 3,
        name: "Toyota Avanza",
        type: "car",
        image: "https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=Toyota%20Avanza%20black%20MPV%20family%20car&image_size=square_hd",
        price: 2500,
        seats: 7,
        transmission: "Automatic",
        fuel: "Gasoline"
      },
      {
        id: 4,
        name: "Mio Sporty",
        type: "motorcycle",
        image: "https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=Yamaha%20Mio%20Sporty%20blue%20scooter%20motorcycle&image_size=square_hd",
        price: 500,
        seats: 2,
        transmission: "Automatic",
        fuel: "Gasoline"
      },
      {
        id: 5,
        name: "Nmax",
        type: "motorcycle",
        image: "https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=Yamaha%20Nmax%20red%20maxi%20scooter%20premium%20motorcycle&image_size=square_hd",
        price: 800,
        seats: 2,
        transmission: "Automatic",
        fuel: "Gasoline"
      },
      {
        id: 6,
        name: "Honda Click",
        type: "motorcycle",
        image: "https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=Honda%20Click%20black%20sport%20scooter%20motorcycle&image_size=square_hd",
        price: 600,
        seats: 2,
        transmission: "Automatic",
        fuel: "Gasoline"
      },
      {
        id: 7,
        name: "Ford Ecosport",
        type: "car",
        image: "https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=Ford%20Ecosport%20white%20SUV%20compact%20crossover&image_size=square_hd",
        price: 2800,
        seats: 5,
        transmission: "Automatic",
        fuel: "Gasoline"
      },
      {
        id: 8,
        name: "Mio Soul i125",
        type: "motorcycle",
        image: "https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=Yamaha%20Mio%20Soul%20i125%20orange%20scooter%20motorcycle&image_size=square_hd",
        price: 550,
        seats: 2,
        transmission: "Automatic",
        fuel: "Gasoline"
      }
    ];
    let bookings = [];

    function initSupabase() {
      if (SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY') {
        try {
          supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          checkAuth();
        } catch (e) {
          console.log('Supabase not configured, using localStorage');
        }
      }
    }

    async function checkAuth() {
      if (!supabase) return;
      const { data: { session } } = await supabase.auth.getSession();
      currentUser = session?.user;
      updateAuthUI();
    }

    function updateAuthUI() {
      const authBtn = document.getElementById('authBtn');
      if (currentUser) {
        authBtn.style.display = 'inline-block';
        authBtn.textContent = `Logout (${currentUser.email})`;
        authBtn.onclick = adminLogout;
      } else {
        authBtn.style.display = 'none';
      }
    }

    async function adminLogin() {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      const errorEl = document.getElementById('loginError');
      
      if (!supabase) {
        // Fallback to simple localStorage auth for demo
        if (email === 'admin@demo.com' && password === 'demo123') {
          currentUser = { email: email };
          renderAdminDashboard();
        } else {
          errorEl.textContent = 'Invalid credentials! Try admin@demo.com / demo123';
          errorEl.style.display = 'block';
        }
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      
      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
      } else {
        currentUser = data.user;
        updateAuthUI();
        renderAdminDashboard();
      }
    }

    async function adminLogout() {
      if (supabase) {
        await supabase.auth.signOut();
      }
      currentUser = null;
      updateAuthUI();
      switchPage('home');
    }

    function renderVehicles() {
      const container = document.getElementById('vehicles');
      container.innerHTML = '';

      const filteredVehicles = currentFilter === 'all' 
        ? vehicles 
        : vehicles.filter(v => v.type === currentFilter);

      filteredVehicles.forEach(vehicle => {
        const card = document.createElement('div');
        card.className = 'vehicle-card';
        card.innerHTML = `
          <img src="${vehicle.image}" alt="${vehicle.name}" class="vehicle-image">
          <div class="vehicle-info">
            <h3 class="vehicle-name">${vehicle.name}</h3>
            <p class="vehicle-type">${vehicle.type === 'car' ? 'Car' : 'Motorcycle'}</p>
            <div class="vehicle-details">
              <span class="detail">👤 ${vehicle.seats} seats</span>
              <span class="detail">⚙️ ${vehicle.transmission}</span>
              <span class="detail">⛽ ${vehicle.fuel}</span>
            </div>
            <div class="vehicle-footer">
              <div class="price">₱${vehicle.price}<span>/day</span></div>
              <button class="btn rent-btn" data-id="${vehicle.id}">Rent Now</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });

      document.querySelectorAll('.rent-btn').forEach(btn => {
        btn.addEventListener('click', () => openBookingModal(parseInt(btn.dataset.id)));
      });
    }

    function openBookingModal(vehicleId) {
      selectedVehicle = vehicles.find(v => v.id === vehicleId);
      if (!selectedVehicle) return;

      document.getElementById('modalTitle').textContent = `Book ${selectedVehicle.name}`;
      document.getElementById('bookingModal').classList.add('open');

      const today = new Date().toISOString().split('T')[0];
      document.getElementById('pickupDate').value = today;
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      document.getElementById('returnDate').value = tomorrow.toISOString().split('T')[0];
      
      resetModalBody();
    }

    function resetModalBody() {
      document.getElementById('modalBody').innerHTML = `
        <div class="form-group">
          <label for="customerName">Your Name</label>
          <input type="text" id="customerName" placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label for="customerEmail">Email</label>
          <input type="email" id="customerEmail" placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="customerPhone">Phone</label>
          <input type="tel" id="customerPhone" placeholder="Enter your phone number">
        </div>
        <div class="form-group">
          <label for="pickupDate">Pickup Date</label>
          <input type="date" id="pickupDate">
        </div>
        <div class="form-group">
          <label for="returnDate">Return Date</label>
          <input type="date" id="returnDate">
        </div>
      `;
      document.getElementById('confirmBtn').style.display = 'inline-block';
      document.getElementById('cancelBtn').textContent = 'Cancel';
    }

    function closeBookingModal() {
      document.getElementById('bookingModal').classList.remove('open');
      selectedVehicle = null;
    }

    async function confirmBooking() {
      const name = document.getElementById('customerName').value.trim();
      const email = document.getElementById('customerEmail').value.trim();
      const phone = document.getElementById('customerPhone').value.trim();
      const pickup = document.getElementById('pickupDate').value;
      const returnDate = document.getElementById('returnDate').value;

      if (!name || !email || !phone || !pickup || !returnDate) {
        alert('Please fill in all fields');
        return;
      }

      if (new Date(returnDate) <= new Date(pickup)) {
        alert('Return date must be after pickup date');
        return;
      }

      const days = Math.ceil((new Date(returnDate) - new Date(pickup)) / (1000 * 60 * 60 * 24));
      const total = selectedVehicle.price * days;

      const booking = {
        id: crypto.randomUUID(),
        vehicle_id: selectedVehicle.id,
        vehicle_name: selectedVehicle.name,
        vehicle_type: selectedVehicle.type,
        customer_name: name,
        customer_email: email,
        customer_phone: phone,
        pickup_date: pickup,
        return_date: returnDate,
        days: days,
        total: total,
        status: 'pending',
        created_at: new Date().toISOString()
      };

      if (supabase) {
        const { error } = await supabase.from('bookings').insert([booking]);
        if (error) {
          console.error('Error saving booking:', error);
        }
      }
      
      bookings.unshift(booking);
      saveBookingsLocal();

      document.getElementById('modalBody').innerHTML = `
        <div class="success-message">
          <div class="success-icon">✅</div>
          <h3>Booking Confirmed!</h3>
          <p>Thank you, ${name}!</p>
          <p><strong>${selectedVehicle.name}</strong></p>
          <p>Pickup: ${new Date(pickup).toLocaleDateString()}</p>
          <p>Return: ${new Date(returnDate).toLocaleDateString()}</p>
          <p style="font-size: 24px; font-weight: 700; color: var(--accent); margin-top: 16px;">Total: ₱${total}</p>
          <p style="color: var(--muted); margin-top: 16px;">We'll send a confirmation email to ${email}</p>
        </div>
      `;

      document.getElementById('confirmBtn').style.display = 'none';
      document.getElementById('cancelBtn').textContent = 'Close';
    }

    function loadBookingsLocal() {
      try {
        bookings = JSON.parse(localStorage.getItem('balatero_bookings')) || [];
      } catch {
        bookings = [];
      }
    }

    function saveBookingsLocal() {
      localStorage.setItem('balatero_bookings', JSON.stringify(bookings));
    }

    async function loadBookings() {
      if (supabase) {
        const { data, error } = await supabase.from('bookings').select('*').order('created_at', { ascending: false });
        if (!error) {
          bookings = data;
          return;
        }
      }
      loadBookingsLocal();
    }

    function renderAdminDashboard() {
      document.getElementById('adminContent').innerHTML = `
        <div class="admin-header">
          <h1>Admin Dashboard</h1>
          <div style="display: flex; gap: 12px;">
            <button class="btn btn-secondary" onclick="clearAllBookings()">Clear All Bookings</button>
          </div>
        </div>

        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">Total Bookings</div>
            <div class="stat-value" id="totalBookings">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pending</div>
            <div class="stat-value" id="pendingBookings">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Confirmed</div>
            <div class="stat-value" id="confirmedBookings">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value" id="totalRevenue">₱0</div>
          </div>
        </div>

        <h2 style="margin: 0 0 16px;">Bookings</h2>
        <div id="bookingsContainer"></div>
      `;
      loadBookings().then(() => {
        updateAdminStats();
        renderBookings();
      });
    }

    function updateAdminStats() {
      const totalBookings = bookings.length;
      const pendingBookings = bookings.filter(b => b.status === 'pending').length;
      const confirmedBookings = bookings.filter(b => b.status === 'confirmed').length;
      const totalRevenue = bookings.filter(b => b.status === 'confirmed').reduce((sum, b) => sum + b.total, 0);

      document.getElementById('totalBookings').textContent = totalBookings;
      document.getElementById('pendingBookings').textContent = pendingBookings;
      document.getElementById('confirmedBookings').textContent = confirmedBookings;
      document.getElementById('totalRevenue').textContent = `₱${totalRevenue.toLocaleString()}`;
    }

    function renderBookings() {
      const container = document.getElementById('bookingsContainer');
      
      if (bookings.length === 0) {
        container.innerHTML = '<div class="empty-state">No bookings yet</div>';
        return;
      }

      let tableHTML = `
        <table class="bookings-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Customer</th>
              <th>Vehicle</th>
              <th>Pickup</th>
              <th>Return</th>
              <th>Total</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
      `;

      bookings.forEach(booking => {
        const customerName = booking.customer_name || booking.customerName;
        const customerEmail = booking.customer_email || booking.customerEmail;
        const customerPhone = booking.customer_phone || booking.customerPhone;
        const vehicleName = booking.vehicle_name || booking.vehicleName;
        const pickupDate = booking.pickup_date || booking.pickupDate;
        const returnDate = booking.return_date || booking.returnDate;
        const createdAt = booking.created_at || booking.createdAt;

        tableHTML += `
          <tr>
            <td>${new Date(createdAt).toLocaleDateString()}</td>
            <td>
              <div><strong>${customerName}</strong></div>
              <div style="font-size: 12px; color: var(--muted);">${customerEmail}</div>
              <div style="font-size: 12px; color: var(--muted);">${customerPhone}</div>
            </td>
            <td>${vehicleName}</td>
            <td>${new Date(pickupDate).toLocaleDateString()}</td>
            <td>${new Date(returnDate).toLocaleDateString()}</td>
            <td>₱${booking.total.toLocaleString()}</td>
            <td><span class="status-badge status-${booking.status}">${booking.status.charAt(0).toUpperCase() + booking.status.slice(1)}</span></td>
            <td>
              <div class="action-buttons">
                ${booking.status === 'pending' ? `<button class="btn btn-success" onclick="updateBookingStatus('${booking.id}', 'confirmed')">Confirm</button>` : ''}
                ${booking.status !== 'cancelled' ? `<button class="btn btn-danger" onclick="updateBookingStatus('${booking.id}', 'cancelled')">Cancel</button>` : ''}
                <button class="btn btn-secondary" onclick="deleteBooking('${booking.id}')">Delete</button>
              </div>
            </td>
          </tr>
        `;
      });

      tableHTML += `
          </tbody>
        </table>
      `;

      container.innerHTML = tableHTML;
    }

    async function updateBookingStatus(id, status) {
      const booking = bookings.find(b => b.id === id);
      if (booking) {
        booking.status = status;
        
        if (supabase) {
          const { error } = await supabase.from('bookings').update({ status }).eq('id', id);
          if (error) console.error('Error updating booking:', error);
        }
        
        saveBookingsLocal();
        updateAdminStats();
        renderBookings();
      }
    }

    async function deleteBooking(id) {
      if (confirm('Are you sure you want to delete this booking?')) {
        if (supabase) {
          const { error } = await supabase.from('bookings').delete().eq('id', id);
          if (error) console.error('Error deleting booking:', error);
        }
        bookings = bookings.filter(b => b.id !== id);
        saveBookingsLocal();
        updateAdminStats();
        renderBookings();
      }
    }

    async function clearAllBookings() {
      if (confirm('Are you sure you want to clear ALL bookings? This cannot be undone.')) {
        if (supabase) {
          const { error } = await supabase.from('bookings').delete().neq('id', '00000000-0000-0000-0000-000000000000');
          if (error) console.error('Error clearing bookings:', error);
        }
        bookings = [];
        saveBookingsLocal();
        updateAdminStats();
        renderBookings();
      }
    }

    function scrollToVehicles() {
      document.getElementById('vehicles').scrollIntoView({ behavior: 'smooth' });
    }

    function switchPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      
      if (page === 'home') {
        document.getElementById('homePage').classList.add('active');
        document.querySelector('[data-page="home"]').classList.add('active');
      } else if (page === 'admin') {
        document.getElementById('adminPage').classList.add('active');
        document.querySelector('[data-page="admin"]').classList.add('active');
        
        if (!currentUser) {
          document.getElementById('adminContent').innerHTML = `
            <div class="login-container">
              <div class="login-card">
                <h2>Admin Login</h2>
                <div class="form-group">
                  <label for="adminEmail">Email</label>
                  <input type="email" id="adminEmail" placeholder="admin@example.com">
                </div>
                <div class="form-group">
                  <label for="adminPassword">Password</label>
                  <input type="password" id="adminPassword" placeholder="••••••••">
                </div>
                <div id="loginError" style="color: var(--danger); font-size: 14px; margin-bottom: 16px; display: none;"></div>
                <button class="btn" style="width: 100%;" onclick="adminLogin()">Login</button>
                <p style="text-align: center; margin-top: 16px; color: var(--muted); font-size: 12px;">Demo: admin@demo.com / demo123</p>
              </div>
            </div>
          `;
        } else {
          renderAdminDashboard();
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initSupabase();
      loadBookingsLocal();
      renderVehicles();

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          renderVehicles();
        });
      });

      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          switchPage(link.dataset.page);
        });
      });

      document.getElementById('closeModal').addEventListener('click', closeBookingModal);
      document.getElementById('cancelBtn').addEventListener('click', () => {
        closeBookingModal();
      });
      document.getElementById('confirmBtn').addEventListener('click', confirmBooking);
    });
  </script>
</body>
</html>
